services:
  web:
    build: .
    container_name: proframos-web
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # HTTP router (port 80)
      - "traefik.http.routers.proframos-http.rule=Host(`proframos.com`)"
      - "traefik.http.routers.proframos-http.entrypoints=web"
      - "traefik.http.routers.proframos-http-www.rule=Host(`www.proframos.com`)"
      - "traefik.http.routers.proframos-http-www.entrypoints=web"
      # HTTPS router (port 443) with Let's Encrypt
      - "traefik.http.routers.proframos.rule=Host(`proframos.com`)"
      - "traefik.http.routers.proframos.entrypoints=websecure"
      - "traefik.http.routers.proframos.tls.certresolver=letsencrypt"
      - "traefik.http.routers.proframos-www.rule=Host(`www.proframos.com`)"
      - "traefik.http.routers.proframos-www.entrypoints=websecure"
      - "traefik.http.routers.proframos-www.tls.certresolver=letsencrypt"
      # Service
      - "traefik.http.services.proframos.loadbalancer.server.port=80"
    networks:
      - proxy

networks:
  proxy:
    external: true
