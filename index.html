<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direito Constitucional para Concursos | Prof. Gabriel Ramos</title>
  <meta name="description" content="Aulas de Direito Constitucional para concursos públicos com o Prof. Gabriel Ramos — claras, objetivas e focadas no que realmente cai nas provas.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 800px;
    }

    .logo {
      font-size: 4rem;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 10px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: #e94560;
      margin-bottom: 30px;
      font-weight: 500;
    }

    .tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      color: #a0a0a0;
      margin-bottom: 40px;
      line-height: 1.6;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .cta {
      display: inline-block;
      background: #e94560;
      color: #fff;
      padding: 15px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
      cursor: pointer;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
    }

    .social {
      margin-top: 50px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .social a {
      color: #a0a0a0;
      padding: 10px 20px;
      font-size: 1rem;
      text-decoration: none;
      transition: color 0.2s, background 0.2s;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .social a:hover {
      color: #e94560;
      background: rgba(233, 69, 96, 0.1);
      border-color: rgba(233, 69, 96, 0.3);
    }

    .footer {
      margin-top: 60px;
      color: #555;
      font-size: 0.85rem;
    }

    @media (max-width: 480px) {
      .logo { font-size: 3rem; }
      .cta { padding: 12px 30px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚖️</div>
    <h1>Direito Constitucional para Concursos</h1>
    <p class="subtitle">Prof. Gabriel Ramos</p>
    <p class="tagline">Aulas claras, objetivas e focadas no que realmente cai nas provas. Prepare-se para conquistar sua vaga.</p>
    <a href="https://instagram.com/prof.gabrielramos" class="cta" target="_blank" rel="noopener">Seguir no Instagram</a>
    <div class="social">
      <a href="https://instagram.com/prof.gabrielramos" target="_blank" rel="noopener">📷 Instagram</a>
      <a href="https://youtube.com/@proframos" target="_blank" rel="noopener">▶️ YouTube</a>
    </div>
    <p class="footer">© 2025 Prof. Gabriel Ramos</p>
  </div>
</body>
</html>
